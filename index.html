<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MeetSpace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <!-- ══════════════ LOBBY ══════════════ -->
  <div id="lobby">
    <div class="lobby-bg">
      <div class="blob blob1"></div>
      <div class="blob blob2"></div>
      <div class="blob blob3"></div>
    </div>

    <div class="lobby-card">
      <div class="logo">
        <span class="logo-icon">◈</span>
        <span class="logo-text">MeetSpace</span>
      </div>
      <p class="lobby-subtitle">Videollamadas privadas, sin complicaciones</p>

      <div class="field">
        <label>Tu nombre</label>
        <input id="nameInput" type="text" placeholder="Ej: Ana García" maxlength="30">
      </div>

      <div class="divider"><span>Salas disponibles</span></div>
      <div id="roomList" class="room-list">
        <div class="room-empty">Cargando salas...</div>
      </div>

      <div class="divider"><span>O crea una nueva</span></div>
      <div class="create-row">
        <input id="roomInput" type="text" placeholder="Nombre de sala" maxlength="30">
        <input id="roomPin" type="text" placeholder="PIN (opcional)" maxlength="10">
        <button id="createBtn" class="btn-primary">Crear</button>
      </div>

      <div id="lobbyError" class="error-msg"></div>
    </div>
  </div>

  <!-- ══════════ MODAL PIN ══════════ -->
  <div id="pinModal" class="modal-overlay hidden">
    <div class="modal-card">
      <div class="modal-title">🔒 Sala protegida</div>
      <p class="modal-subtitle">Esta sala requiere un PIN para entrar</p>
      <input id="pinInput" type="text" placeholder="Ingresa el PIN" maxlength="10">
      <div class="modal-row">
        <button id="pinCancelBtn" class="btn-secondary">Cancelar</button>
        <button id="pinConfirmBtn" class="btn-primary">Entrar</button>
      </div>
      <div id="pinError" class="error-msg"></div>
    </div>
  </div>

  <!-- ══════════════ ROOM ══════════════ -->
  <div id="room" class="hidden">

    <!-- Toast container -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <span class="logo-icon small">◈</span>
        <span id="roomLabel" class="room-name-label"></span>
        <span id="roomPinBadge" class="pin-badge hidden" title="Sala con PIN">🔒</span>
      </div>

      <!-- Participants -->
      <div class="sidebar-section">
        <div class="section-title">Participantes</div>
        <div id="participantList" class="participant-list"></div>
      </div>

      <!-- Chat -->
      <div class="sidebar-section chat-section">
        <div class="section-title">
          Chat
          <button id="newPollBtn" class="section-action" title="Crear encuesta">📊</button>
          <button id="uploadBtn" class="section-action" title="Analizar archivo con IA">🤖</button>
          <input id="fileInput" type="file" accept="image/*,.pdf" style="display:none">
        </div>
        <div id="chatMessages" class="chat-messages"></div>
        <div id="pollContainer" class="poll-container"></div>
        <div class="chat-input-row">
          <input id="chatInput" type="text" placeholder="Mensaje..." maxlength="300">
          <button id="sendBtn" class="btn-send">↑</button>
        </div>
      </div>
    </aside>

    <!-- Main video area -->
    <main class="video-area">
      <div id="videoGrid" class="video-grid"></div>

      <!-- Reactions bar -->
      <div class="reactions-bar">
        <button class="reaction-btn" data-emoji="👍">👍</button>
        <button class="reaction-btn" data-emoji="😂">😂</button>
        <button class="reaction-btn" data-emoji="❤️">❤️</button>
        <button class="reaction-btn" data-emoji="👏">👏</button>
        <button class="reaction-btn" data-emoji="😮">😮</button>
      </div>

      <!-- Controls -->
      <div class="controls">
        <button id="micBtn" class="ctrl-btn" title="Micrófono">
          <span class="ctrl-icon">🎤</span>
          <span class="ctrl-label">Mic</span>
        </button>
        <button id="camBtn" class="ctrl-btn" title="Cámara">
          <span class="ctrl-icon">📷</span>
          <span class="ctrl-label">Cam</span>
        </button>
        <button id="screenBtn" class="ctrl-btn" title="Compartir pantalla">
          <span class="ctrl-icon">🖥️</span>
          <span class="ctrl-label">Pantalla</span>
        </button>
        <button id="handBtn" class="ctrl-btn" title="Levantar mano">
          <span class="ctrl-icon">✋</span>
          <span class="ctrl-label">Mano</span>
        </button>
        <button id="leaveBtn" class="ctrl-btn leave" title="Salir">
          <span class="ctrl-icon">📵</span>
          <span class="ctrl-label">Salir</span>
        </button>
      </div>
    </main>
  </div>

  <!-- Poll creation modal -->
  <div id="pollModal" class="modal-overlay hidden">
    <div class="modal-card">
      <div class="modal-title">📊 Nueva encuesta</div>
      <input id="pollQuestion" type="text" placeholder="Pregunta..." maxlength="100">
      <div id="pollOptions">
        <input type="text" class="poll-option-input" placeholder="Opción 1" maxlength="60">
        <input type="text" class="poll-option-input" placeholder="Opción 2" maxlength="60">
      </div>
      <button id="addOptionBtn" class="btn-secondary">+ Agregar opción</button>
      <div class="modal-row">
        <button id="pollCancelBtn" class="btn-secondary">Cancelar</button>
        <button id="pollSendBtn" class="btn-primary">Lanzar</button>
      </div>
      <div id="pollError" class="error-msg"></div>
    </div>
  </div>

  <script type="module" src="/app.js"></script>
</body>
</html>
